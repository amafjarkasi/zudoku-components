<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="logoAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Diamond/Gem Icon -->
  <g transform="translate(10, 10)" filter="url(#glow)">
    <!-- Outer diamond -->
    <path d="M50 5 L95 60 L50 115 L5 60 Z" stroke="url(#logoAccent)" stroke-width="4" stroke-linejoin="round" fill="none"/>
    <!-- Inner diamond -->
    <path d="M50 22 L78 60 L50 98 L22 60 Z" stroke="url(#logoGrad)" stroke-width="2" stroke-linejoin="round" fill="none" opacity="0.7"/>
    <!-- Center highlight -->
    <path d="M50 35 L65 60 L50 85 L35 60 Z" fill="url(#logoGrad)" opacity="0.4"/>
    <!-- Top facet -->
    <path d="M50 5 L78 60 L50 35 L22 60 Z" fill="url(#logoAccent)" opacity="0.15"/>
  </g>

  <!-- Brand Name -->
  <text x="120" y="75" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#logoGrad)" letter-spacing="-0.03em">Zephyr</text>

  <!-- Tagline -->
  <text x="122" y="100" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#71717a" letter-spacing="0.02em">Developer Portal</text>
</svg>