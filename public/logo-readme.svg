<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="logoAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Diamond/Gem Icon - height matches text cap height -->
  <g transform="translate(0, 2)">
    <path d="M20 10 L36 30 L20 50 L4 30 Z" stroke="url(#logoAccent)" stroke-width="2" stroke-linejoin="round" fill="none"/>
    <path d="M20 17 L29 30 L20 43 L11 30 Z" fill="url(#logoGrad)" opacity="0.35"/>
  </g>

  <!-- Brand Name - same height as icon -->
  <text x="42" y="40" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="url(#logoGrad)" letter-spacing="-0.03em">Zephyr</text>

  <!-- Tagline - aligned below text -->
  <text x="44" y="54" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="#71717a" letter-spacing="0.02em">Developer Portal</text>
</svg>