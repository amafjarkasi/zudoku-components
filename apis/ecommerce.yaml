openapi: 3.0.0
info:
  title: Syntara E-Commerce API
  description: API for managing products, cart, and orders.
  version: 1.0.0
servers:
  - url: https://api.ecommerce.syntara.com/v1
paths:
  /products:
    get:
      summary: List all products
      operationId: listProducts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
          example: 10
      responses:
        '200':
          description: A list of products.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
              example:
                - id: "prod_8x4k9m2p"
                  name: "Premium Widget"
                  price: 29.99
                  category: "Electronics"
                  inStock: true
                - id: "prod_3n7h5j1q"
                  name: "Basic Gadget"
                  price: 14.99
                  category: "Electronics"
                  inStock: true
                - id: "prod_9m2k4x7r"
                  name: "Pro Device"
                  price: 99.99
                  category: "Electronics"
                  inStock: false
    post:
      summary: Create a new product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
            example:
              name: "New Product"
              price: 49.99
              category: "Electronics"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
              example:
                id: "prod_new123"
                name: "New Product"
                price: 49.99
                category: "Electronics"
                inStock: true
  /products/{id}:
    get:
      summary: Get product details
      operationId: getProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "prod_8x4k9m2p"
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
              example:
                id: "prod_8x4k9m2p"
                name: "Premium Widget"
                price: 29.99
                category: "Electronics"
                inStock: true
                description: "A high-quality widget for everyday use"
                sku: "WGT-PRO-001"
  /orders:
    post:
      summary: Place an order
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            example:
              customerId: "cust_9k2m4x7p"
              items:
                - productId: "prod_8x4k9m2p"
                  quantity: 2
                - productId: "prod_3n7h5j1q"
                  quantity: 1
              shippingAddress:
                street: "123 Main St"
                city: "San Francisco"
                state: "CA"
                zip: "94102"
                country: "US"
      responses:
        '201':
          description: Order placed
          content:
            application/json:
              example:
                orderId: "ord_7p2x4m9k"
                status: "confirmed"
                customerId: "cust_9k2m4x7p"
                items:
                  - productId: "prod_8x4k9m2p"
                    quantity: 2
                    price: 29.99
                  - productId: "prod_3n7h5j1q"
                    quantity: 1
                    price: 14.99
                subtotal: 74.97
                tax: 6.75
                total: 81.72
                createdAt: "2026-05-11T14:30:00Z"
  /orders/{id}:
    get:
      summary: Get order details
      operationId: getOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "ord_7p2x4m9k"
      responses:
        '200':
          description: Order details
          content:
            application/json:
              example:
                orderId: "ord_7p2x4m9k"
                status: "processing"
                customerId: "cust_9k2m4x7p"
                items:
                  - productId: "prod_8x4k9m2p"
                    quantity: 2
                    price: 29.99
                subtotal: 74.97
                tax: 6.75
                total: 81.72
                shippingAddress:
                  street: "123 Main St"
                  city: "San Francisco"
                  state: "CA"
                  zip: "94102"
                  country: "US"
                createdAt: "2026-05-11T14:30:00Z"
                updatedAt: "2026-05-11T14:35:00Z"
    patch:
      summary: Update order status
      operationId: updateOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: "ord_7p2x4m9k"
      requestBody:
        required: true
        content:
          application/json:
            example:
              status: "shipped"
              trackingNumber: "1Z999AA10123456784"
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              example:
                orderId: "ord_7p2x4m9k"
                status: "shipped"
                trackingNumber: "1Z999AA10123456784"
                updatedAt: "2026-05-12T09:15:00Z"
  /cart:
    get:
      summary: Get current cart
      operationId: getCart
      responses:
        '200':
          description: Current cart contents
          content:
            application/json:
              example:
                cartId: "cart_4k8m2p9x"
                customerId: "cust_9k2m4x7p"
                items:
                  - productId: "prod_8x4k9m2p"
                    quantity: 2
                    name: "Premium Widget"
                    price: 29.99
                subtotal: 59.98
                itemCount: 2
                createdAt: "2026-05-11T10:00:00Z"
    post:
      summary: Add item to cart
      operationId: addToCart
      requestBody:
        required: true
        content:
          application/json:
            example:
              productId: "prod_9m2k4x7r"
              quantity: 1
      responses:
        '201':
          description: Item added to cart
          content:
            application/json:
              example:
                cartId: "cart_4k8m2p9x"
                item:
                  productId: "prod_9m2k4x7r"
                  quantity: 1
                  name: "Pro Device"
                  price: 99.99
                message: "Item added successfully"
  /inventory:
    get:
      summary: Check inventory levels
      operationId: getInventory
      parameters:
        - name: productId
          in: query
          schema:
            type: string
          example: "prod_8x4k9m2p"
      responses:
        '200':
          description: Inventory status
          content:
            application/json:
              example:
                productId: "prod_8x4k9m2p"
                available: 142
                reserved: 18
                total: 160
                warehouse: "west-coast-1"
                restockDate: "2026-05-18"
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
          example: "prod_8x4k9m2p"
        name:
          type: string
          example: "Premium Widget"
        price:
          type: number
          example: 29.99
        category:
          type: string
          example: "Electronics"
        inStock:
          type: boolean
          example: true
        description:
          type: string
          example: "A high-quality widget for everyday use"
        sku:
          type: string
          example: "WGT-PRO-001"
    ProductInput:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
          example: "New Product"
        price:
          type: number
          example: 49.99
        category:
          type: string
          example: "Electronics"
    Order:
      type: object
      properties:
        orderId:
          type: string
          example: "ord_7p2x4m9k"
        status:
          type: string
          enum: [pending, confirmed, processing, shipped, delivered]
          example: "confirmed"
        customerId:
          type: string
          example: "cust_9k2m4x7p"
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
              quantity:
                type: integer
              price:
                type: number
        subtotal:
          type: number
          example: 74.97
        tax:
          type: number
          example: 6.75
        total:
          type: number
          example: 81.72
        shippingAddress:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            state:
              type: string
            zip:
              type: string
            country:
              type: string
        trackingNumber:
          type: string
          example: "1Z999AA10123456784"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time